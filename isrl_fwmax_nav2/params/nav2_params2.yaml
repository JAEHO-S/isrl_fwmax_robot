amcl:
  ros__parameters:
    use_sim_time: false
    scan_topic: /ouster/scan
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    set_initial_pose: false
    tf_broadcast: true
    min_particles: 500
    max_particles: 2000
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    laser_max_range: 30.0
    laser_model_type: likelihood_field

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: /home/jhgod/maps/lab_map.yaml

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    default_bt_xml_filename: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    cmd_vel_topic: "cmd_vel_nav"
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.1
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      use_rotate_to_heading: false
      stateful: true
      lookahead_dist: 0.2
      min_lookahead_dist: 0.1
      max_lookahead_dist: 0.3
      lookahead_time: 0.6


velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    velocity_topic: "cmd_vel_nav"
    smoothed_cmd_vel_topic: "cmd_vel"
    max_velocity: [0.10, 0.0, 0.25]
    min_velocity: [-0.05, 0.0, -0.25]
    max_accel: [0.20, 0.0, 0.40]
    max_decel: [-0.25, 0.0, -0.50]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

