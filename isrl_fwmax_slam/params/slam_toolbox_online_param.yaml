slam_toolbox:
  ros__parameters:
    scan_topic: /ouster/scan
    odom_frame: odom
    base_frame: base_footprint
    map_frame: map
    mode: mapping
    use_scan_matching: true
    use_map_saver: true
    resolution: 0.05
    max_laser_range: 30.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.02
    map_update_interval: 2.0
