DWAPlannerROS:
  ############################
  # 1. 기본 로봇 모델 설정
  ############################
  holonomic_robot: false         # 보통 x + yaw만 쓰는 구조면 false

  ############################
  # 2. 병진 속도
  ############################
  max_vel_x: 0.25                 # 최대 전진 속도
  min_vel_x: 0.0                 # 후진은 escape_vel로만 허용 (버벅임 줄이기)

  max_vel_trans: 0.25
  min_vel_trans: 0.08            # 0.10 → 0.08 (너무 살짝만 움직이는 구간 줄이되, 완전 0은 아님)

  ############################
  # 3. 회전 속도 관련 (★ 핵심)
  ############################
  max_vel_theta: 1.0             # 실제 로봇 최대 회전속도에 맞게 (필요하면 0.8~1.2 사이에서 튜닝)

  # 회전해야 할 때는 최소 이 정도는 돌도록 강제
  min_vel_theta: 0.4             # "조금이라도 돌거면 0.4rad/s 이상으로"

  # 제자리 회전(in-place) 최소 속도 (있으면 사용)
  min_in_place_vel_theta: 0.6    # 제자리로 돌 때는 더 과감하게 도는게 낫다

  acc_lim_x: 0.5                 # 전진 가속도
  acc_lim_theta: 0.6             # 0.5 → 0.6 정도로 약간 올려, 회전 속도까지 도달을 조금 더 빠르게

  # "멈췄다"고 보는 기준: 이 값보다 회전속도가 작으면 멈춘 것으로 간주
  rot_stopped_vel: 0.2           # 너무 작게 잡지 말 것

  ############################
  # 4. 시뮬레이션 파라미터
  ############################
  sim_time: 2.5                  # 3.0 → 2.5: 너무 길면 느릿한 궤적 선호, 적당히 줄여서 반응성↑
  vx_samples: 10
  vtheta_samples: 30
  sim_granularity: 0.05

  ############################
  # 5. 득점/비용 가중치
  ############################
  path_distance_bias: 5.0        # global path를 얼마나 따를지
  goal_distance_bias: 2.0        # goal로 직진하려는 성향
  occdist_scale: 2.0             # 3.0 → 2.0: 장애물 회피를 조금 덜 보수적으로 해서 회전 공간 확보

  forward_point_distance: 0.325
  stop_time_buffer: 0.4

  ############################
  # 6. 목표 근처 허용 오차
  ############################
  yaw_goal_tolerance: 0.25       # 그대로 사용 (약 14도)
  xy_goal_tolerance: 0.15

  ############################
  # 7. 기타
  ############################
  prune_plan: true
  escape_vel: -0.1               # 뒤로 빠져야 할 때만 후진 사용
