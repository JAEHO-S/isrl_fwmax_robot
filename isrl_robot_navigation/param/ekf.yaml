frequency: 50
two_d_mode: true
publish_tf: true
sensor_timeout: 0.3

imu0: /imu/filtered

#               x     y     z,     roll  pitch  yaw,   vx    vy    vz,  vroll vpitch  vyaw,   ax    ay    az
imu0_config:   [false,false,false, false,false,true, false,false,false, true,  true,  true,  true, true, true]
#                                      ↑ yaw만 사용(2D)
#                                                      ↑ 각속도 사용
#                                                                     ↑ 선형가속도 사용(이게 false면 직진이 안 나옵니다)

imu0_differential: false
imu0_remove_gravitational_acceleration: true

odom0: /mobile_robot/odom

#              x     y     z,    roll pitch yaw,   vx    vy    vz,  vroll vpitch vyaw,  ax    ay    az
odom0_config: [true, true, false, false,false,false, true, true, false, false,false,false, false,false,false]

odom0_differential: false
odom0_queue_size: 10

odom_frame: odom
base_link_frame: mobile_base_link
world_frame: odom

transform_timeout: 0.2
imu0_queue_size: 50