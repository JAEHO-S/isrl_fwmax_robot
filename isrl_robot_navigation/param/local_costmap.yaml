local_costmap:
  ############################
  # 1. 좌표계 / 윈도우 설정
  ############################
  global_frame: odom
  robot_base_frame: mobile_base_link

  update_frequency: 0.5        # 5.0 → 10.0 (로컬 반응성↑, move_base controller_frequency와 비슷하게)
  publish_frequency: 5.0
  transform_tolerance: 0.5

  rolling_window: true
  width: 6.0
  height: 6.0
  resolution: 0.05

  ############################
  # 2. 레이어 플러그인
  ############################
  plugins:
    # - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: film_layer,      type: "film_costmap_layer/FilmLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  ############################
  # 3. 장애물 레이어 (LiDAR)
  ############################
  obstacle_layer:
    enabled: true
    combination_method: 1        # MAX 방식 (일반적)
    observation_sources: lidar

    lidar:
      sensor_frame: os_sensor
      data_type: PointCloud2
      topic: /ouster/points      # 실제 사용 토픽
      marking: true
      clearing: true
      expected_update_rate: 0.1  # 10Hz lidar → 0.1s
      obstacle_range: 4.0
      raytrace_range: 5.0
      min_obstacle_height: -0.3
      max_obstacle_height: 0.2
      inf_is_valid: true
      observation_persistence: 4.0

  ############################
  # 4. film 레이어 (추가 비용)
  ############################
  film_layer:
    enabled: true
    film_topic: /film_cgan/costmap
    lethal_threshold: 80         # 0~100 중 30 이상을 lethal로 볼지 여부. 필요 시 50~80으로 조정
    scale: 1.0

  ############################
  # 5. inflation 레이어
  ############################
  inflation_layer:
    enabled: true
    inflation_radius: 0.5       # 지금 값 유지해도 OK
    cost_scaling_factor: 1.4
