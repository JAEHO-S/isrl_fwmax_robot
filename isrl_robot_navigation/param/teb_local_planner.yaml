TebLocalPlannerROS:

  #######################################
  # 1. 기본 설정
  #######################################
  odom_topic: /mobile_robot/odom    # 네가 move_base에서 remap한 odom 토픽
  map_frame: map

  #######################################
  # 2. 로봇 모델 (diff-like, x + yaw)
  #######################################
  # cmd_vel을 x + yaw로 주고, y는 안 쓰는 구조면:
  max_vel_x: 0.25
  max_vel_x_backwards: 0.15

  max_vel_theta: 1.0
  acc_lim_x: 0.5
  acc_lim_theta: 0.6

  # 측면 속도는 안 쓸 거면 0
  max_vel_y: 0.0
  acc_lim_y: 0.0

  # car-like 로봇으로 모델링할지 여부 (지금은 cmd_vel만 쓰니까 false 유지)
  cmd_angle_instead_rotvel: false
  min_turning_radius: 0.4    # diff-drive처럼 사용 (fw-max pro가 내부적으로 처리)

  #######################################
  # 3. 궤적 / 시간 관련
  #######################################
  dt_ref: 0.3
  dt_hysteresis: 0.1

  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: true

  max_global_plan_lookahead_dist: 3.0
  global_plan_viapoint_sep: 0.5

  #######################################
  # 4. goal 근처 허용 오차
  #######################################
  xy_goal_tolerance: 0.5
  yaw_goal_tolerance: 0.25
  free_goal_vel: false        # goal 근처에서 속도 줄이기

  #######################################
  # 5. 장애물 / costmap 연동
  #######################################
  min_obstacle_dist: 0.75     # footprint + padding과 합쳐서 실제 여유거리 결정됨
  inflation_dist: 0.4         # 대부분 costmap inflation을 그대로 사용하면 0 또는 작게
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0

  obstacle_poses_affected: 15
  dynamic_obstacle_inflation_dist: 0.6
  include_dynamic_obstacles: false   # 일단 false로 시작하고 나중에 필요하면 true

  #######################################
  # 6. 최적화 (성능/품질)
  #######################################
  no_inner_iterations: 5
  no_outer_iterations: 4

  penalty_epsilon: 0.1
  weight_optimaltime: 1.0
  weight_obstacle: 200.0
  weight_viapoint: 1.0
  weight_dynamic_obstacle: 50.0
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1.0    # non-holonomic 제약
  weight_kinematics_forward_drive: 1.0
  weight_kinematics_turning_radius: 0.0

  #######################################
  # 7. 기타
  #######################################
  enable_homotopy_class_planning: false    # 일단 false로 시작 (디버깅 쉬움)
  enable_multithreading: true
  visualize_hc_graph: false
