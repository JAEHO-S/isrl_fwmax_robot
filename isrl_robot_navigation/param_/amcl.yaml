# 필수 프레임은 launch에서 지정했으므로 여기선 센싱/알고리즘 위주
min_particles: 500
max_particles: 5000
kld_err: 0.02
kld_z: 0.99

# odom 잡음 (odom이 거칠면 더 키움)
odom_alpha1: 0.2   # rot -> rot noise
odom_alpha2: 0.2   # trans -> rot noise
odom_alpha3: 0.2   # trans -> trans noise
odom_alpha4: 0.2   # rot -> trans noise

# 레이저 모델 (LaserScan 기준; PointCloud2면 pointcloud_to_laserscan 권장)
laser_max_range: 30.0
laser_min_range: 0.1
laser_z_hit: 0.9
laser_z_rand: 0.05
laser_sigma_hit: 0.2
laser_likelihood_max_dist: 2.0
update_min_d: 0.1
update_min_a: 0.2
resample_interval: 1
recovery_alpha_slow: 0.0
recovery_alpha_fast: 0.0

transform_tolerance: 0.5
tf_broadcast: true    
