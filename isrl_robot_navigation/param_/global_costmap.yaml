global_costmap:
  global_frame: map
  robot_base_frame: mobile_base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  static_map: true

  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  inflation_layer:
    enabled: true
    inflation_radius: 0.5     # local이랑 맞추기
    cost_scaling_factor: 2.4     # local과 동일하게 크게/넓게